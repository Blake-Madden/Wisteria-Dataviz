<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradient for header row (left to right fade) -->
    <linearGradient id="headerRowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aecbeb;stop-opacity:1"/>
    </linearGradient>

    <!-- Gradient for header column (top to bottom fade) -->
    <linearGradient id="headerColGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aecbeb;stop-opacity:1"/>
    </linearGradient>

    <!-- Subtle gradient for cells (slight depth) -->
    <linearGradient id="cellGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5f8fc;stop-opacity:1"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Main grid container with shadow -->
  <g transform="translate(28, 26)" filter="url(#dropShadow)">
    <!-- Grid dimensions: 200x200, 5 columns x 6 rows -->

    <!-- White/gradient background for data cells -->
    <rect x="40" y="33" width="160" height="167" fill="url(#cellGradient)"/>

    <!-- Blue header row (top) with gradient -->
    <rect x="40" y="0" width="160" height="33" fill="url(#headerRowGradient)"/>

    <!-- Blue header column (left) with gradient -->
    <rect x="0" y="0" width="40" height="200" fill="url(#headerColGradient)"/>

    <!-- Corner cell (slightly darker) -->
    <rect x="0" y="0" width="40" height="33" fill="#7aa8d6"/>

    <!-- Grid lines -->
    <g stroke="#b0b8c0" stroke-width="1">
      <!-- Horizontal lines -->
      <line x1="0" y1="33" x2="200" y2="33"/>
      <line x1="40" y1="66" x2="200" y2="66"/>
      <line x1="40" y1="100" x2="200" y2="100"/>
      <line x1="40" y1="133" x2="200" y2="133"/>
      <line x1="40" y1="166" x2="200" y2="166"/>

      <!-- Vertical lines -->
      <line x1="40" y1="0" x2="40" y2="200"/>
      <line x1="80" y1="33" x2="80" y2="200"/>
      <line x1="120" y1="33" x2="120" y2="200"/>
      <line x1="160" y1="33" x2="160" y2="200"/>
    </g>

    <!-- Header column internal lines (subtle) -->
    <g stroke="#6a9ed0" stroke-width="1" stroke-opacity="0.5">
      <line x1="0" y1="66" x2="40" y2="66"/>
      <line x1="0" y1="100" x2="40" y2="100"/>
      <line x1="0" y1="133" x2="40" y2="133"/>
      <line x1="0" y1="166" x2="40" y2="166"/>
    </g>

    <!-- Header row internal lines (subtle) -->
    <g stroke="#6a9ed0" stroke-width="1" stroke-opacity="0.5">
      <line x1="80" y1="0" x2="80" y2="33"/>
      <line x1="120" y1="0" x2="120" y2="33"/>
      <line x1="160" y1="0" x2="160" y2="33"/>
    </g>

    <!-- Outer border (rounded, polished look) -->
    <rect x="0" y="0" width="200" height="200" fill="none" stroke="#5a8abd" stroke-width="2" rx="3" ry="3"/>

    <!-- Inner highlight (top-left shine) -->
    <line x1="1" y1="1" x2="199" y2="1" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="1" y1="1" x2="1" y2="199" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
  </g>
</svg>
