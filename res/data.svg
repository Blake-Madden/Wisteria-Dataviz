<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Colorful data table icon, pivot-longer style -->

  <!-- Header row -->
  <rect x="28" y="28" width="200" height="24" rx="3" fill="#5B9BD5" opacity="0.9"/>
  <!-- Data rows -->
  <rect x="28" y="56" width="200" height="24" rx="2" fill="#A9D18E" opacity="0.7"/>
  <rect x="28" y="84" width="200" height="24" rx="2" fill="#F4B183" opacity="0.7"/>
  <rect x="28" y="112" width="200" height="24" rx="2" fill="#A9D18E" opacity="0.7"/>
  <rect x="28" y="140" width="200" height="24" rx="2" fill="#F4B183" opacity="0.7"/>
  <rect x="28" y="168" width="200" height="24" rx="2" fill="#A9D18E" opacity="0.7"/>
  <rect x="28" y="196" width="200" height="24" rx="2" fill="#F4B183" opacity="0.7"/>

  <!-- Column dividers (white) -->
  <line x1="78" y1="28" x2="78" y2="220" stroke="white" stroke-width="2"/>
  <line x1="128" y1="28" x2="128" y2="220" stroke="white" stroke-width="2"/>
  <line x1="178" y1="28" x2="178" y2="220" stroke="white" stroke-width="2"/>

  <!-- Row dividers (white, between data rows) -->
  <line x1="28" y1="56" x2="228" y2="56" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="84" x2="228" y2="84" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="112" x2="228" y2="112" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="140" x2="228" y2="140" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="168" x2="228" y2="168" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="196" x2="228" y2="196" stroke="white" stroke-width="1.5"/>
</svg>
