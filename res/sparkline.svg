<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#548c34;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e04040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c03030;stop-opacity:1"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Center baseline -->
    <line x1="28" y1="128" x2="228" y2="128" stroke="#909090" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Win bars (above baseline) - green -->
    <rect x="32" y="68" width="18" height="60" rx="2" fill="url(#winGrad)"/>
    <rect x="54" y="88" width="18" height="40" rx="2" fill="url(#winGrad)"/>
    <rect x="98" y="58" width="18" height="70" rx="2" fill="url(#winGrad)"/>
    <rect x="120" y="78" width="18" height="50" rx="2" fill="url(#winGrad)"/>
    <rect x="142" y="90" width="18" height="38" rx="2" fill="url(#winGrad)"/>
    <rect x="186" y="72" width="18" height="56" rx="2" fill="url(#winGrad)"/>
    <rect x="208" y="48" width="18" height="80" rx="2" fill="url(#winGrad)"/>

    <!-- Loss bars (below baseline) - red -->
    <rect x="76" y="128" width="18" height="45" rx="2" fill="url(#lossGrad)"/>
    <rect x="164" y="128" width="18" height="55" rx="2" fill="url(#lossGrad)"/>

    <!-- Highlights on bars -->
    <rect x="34" y="70" width="4" height="56" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="56" y="90" width="4" height="36" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="100" y="60" width="4" height="66" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="122" y="80" width="4" height="46" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="144" y="92" width="4" height="34" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="188" y="74" width="4" height="52" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="210" y="50" width="4" height="76" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="78" y="130" width="4" height="41" rx="1" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="166" y="130" width="4" height="51" rx="1" fill="#ffffff" fill-opacity="0.15"/>
  </g>
</svg>
