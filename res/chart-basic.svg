<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bar1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a7bbf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d06420;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#548c34;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dba200;stop-opacity:1"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Axes -->
    <line x1="48" y1="28" x2="48" y2="210" stroke="#808080" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="210" x2="230" y2="210" stroke="#808080" stroke-width="3" stroke-linecap="round"/>

    <!-- Gridlines -->
    <g stroke="#d0d0d0" stroke-width="1" stroke-dasharray="4,3">
      <line x1="48" y1="165" x2="230" y2="165"/>
      <line x1="48" y1="120" x2="230" y2="120"/>
      <line x1="48" y1="75" x2="230" y2="75"/>
    </g>

    <!-- Bars -->
    <rect x="62" y="105" width="34" height="105" rx="3" ry="3" fill="url(#bar1Grad)"/>
    <rect x="106" y="60" width="34" height="150" rx="3" ry="3" fill="url(#bar2Grad)"/>
    <rect x="150" y="130" width="34" height="80" rx="3" ry="3" fill="url(#bar3Grad)"/>
    <rect x="194" y="42" width="34" height="168" rx="3" ry="3" fill="url(#bar4Grad)"/>

    <!-- Bar highlights -->
    <rect x="64" y="107" width="8" height="101" rx="2" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="108" y="62" width="8" height="146" rx="2" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="152" y="132" width="8" height="76" rx="2" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="196" y="44" width="8" height="164" rx="2" fill="#ffffff" fill-opacity="0.2"/>

    <!-- Tick marks -->
    <g stroke="#808080" stroke-width="2">
      <line x1="44" y1="165" x2="48" y2="165"/>
      <line x1="44" y1="120" x2="48" y2="120"/>
      <line x1="44" y1="75" x2="48" y2="75"/>
    </g>
  </g>
</svg>
