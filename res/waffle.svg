<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="cell1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a7bbf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cell2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d06420;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cell3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#548c34;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8c8c8;stop-opacity:1"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)" transform="translate(28, 28)">
    <!-- 5x5 waffle grid, cell size 38, gap 2 -->
    <!-- Row 1: all blue -->
    <rect x="0" y="0" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="40" y="0" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="80" y="0" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="120" y="0" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="160" y="0" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>

    <!-- Row 2: blue, blue, blue, orange, orange -->
    <rect x="0" y="40" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="40" y="40" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="80" y="40" width="38" height="38" rx="4" fill="url(#cell1Grad)"/>
    <rect x="120" y="40" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="160" y="40" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>

    <!-- Row 3: all orange -->
    <rect x="0" y="80" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="40" y="80" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="80" y="80" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="120" y="80" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="160" y="80" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>

    <!-- Row 4: orange, green, green, green, green -->
    <rect x="0" y="120" width="38" height="38" rx="4" fill="url(#cell2Grad)"/>
    <rect x="40" y="120" width="38" height="38" rx="4" fill="url(#cell3Grad)"/>
    <rect x="80" y="120" width="38" height="38" rx="4" fill="url(#cell3Grad)"/>
    <rect x="120" y="120" width="38" height="38" rx="4" fill="url(#cell3Grad)"/>
    <rect x="160" y="120" width="38" height="38" rx="4" fill="url(#cell3Grad)"/>

    <!-- Row 5: green, empty, empty, empty, empty -->
    <rect x="0" y="160" width="38" height="38" rx="4" fill="url(#cell3Grad)"/>
    <rect x="40" y="160" width="38" height="38" rx="4" fill="url(#emptyGrad)"/>
    <rect x="80" y="160" width="38" height="38" rx="4" fill="url(#emptyGrad)"/>
    <rect x="120" y="160" width="38" height="38" rx="4" fill="url(#emptyGrad)"/>
    <rect x="160" y="160" width="38" height="38" rx="4" fill="url(#emptyGrad)"/>

    <!-- Subtle highlights on filled cells -->
    <rect x="2" y="2" width="10" height="34" rx="3" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="42" y="2" width="10" height="34" rx="3" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="82" y="2" width="10" height="34" rx="3" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="122" y="2" width="10" height="34" rx="3" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="162" y="2" width="10" height="34" rx="3" fill="#ffffff" fill-opacity="0.12"/>
  </g>
</svg>
