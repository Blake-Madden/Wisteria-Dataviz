<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <!-- Circle - top left, slight offset -->
  <circle cx="82" cy="82" r="50" fill="#FFB3BA" stroke="#6C6C6C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Square - bottom left, tilted 12 degrees -->
  <rect x="40" y="116" width="76" height="76" rx="4" fill="#BAE1FF" stroke="#6C6C6C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="rotate(12 78 154)"/>
  <!-- Triangle - center right, tilted -8 degrees -->
  <g transform="rotate(-8 176 124)">
    <polygon points="176,52 228,180 124,180" fill="#BAFFC9" stroke="#6C6C6C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Plus badge background circle -->
  <circle cx="212" cy="212" r="32" fill="#4A90D9"/>
  <!-- Plus sign -->
  <line x1="212" y1="194" x2="212" y2="230" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="194" y1="212" x2="230" y2="212" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
</svg>
