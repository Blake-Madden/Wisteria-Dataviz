<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="personGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a7bbf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="personGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d06420;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="personGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#548c34;stop-opacity:1"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Center person (front, larger) -->
    <circle cx="128" cy="82" r="26" fill="url(#personGrad1)"/>
    <circle cx="128" cy="82" r="22" fill="url(#personGrad1)"/>
    <circle cx="122" cy="77" r="5" fill="#ffffff" fill-opacity="0.15"/>
    <path d="M80,168 Q80,128 128,120 Q176,128 176,168 Z" fill="url(#personGrad1)"/>
    <path d="M86,162 Q86,132 128,124 Q140,126 150,132" fill="#ffffff" fill-opacity="0.1"/>

    <!-- Left person (behind, slightly smaller) -->
    <circle cx="62" cy="96" r="22" fill="url(#personGrad2)"/>
    <circle cx="57" cy="92" r="4" fill="#ffffff" fill-opacity="0.15"/>
    <path d="M22,176 Q22,142 62,134 Q102,142 102,176 Z" fill="url(#personGrad2)"/>

    <!-- Right person (behind, slightly smaller) -->
    <circle cx="194" cy="96" r="22" fill="url(#personGrad3)"/>
    <circle cx="189" cy="92" r="4" fill="#ffffff" fill-opacity="0.15"/>
    <path d="M154,176 Q154,142 194,134 Q234,142 234,176 Z" fill="url(#personGrad3)"/>

    <!-- Connection lines (network effect) -->
    <line x1="80" y1="100" x2="108" y2="90" stroke="#a0a0a0" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="176" y1="100" x2="148" y2="90" stroke="#a0a0a0" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="82" y1="108" x2="174" y2="108" stroke="#a0a0a0" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  </g>
</svg>
