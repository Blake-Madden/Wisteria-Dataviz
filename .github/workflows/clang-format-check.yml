name: test-clang-format
on: [push,pull_request]

jobs:
  clang-format-checking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format-19
        run: sudo apt-get install -y clang-format-19
      - name: Check formatting
        run: |
          # find all project-owned headers and sources, skipping third-party submodules
          FILES=$(find src \( -name '*.h' -o -name '*.cpp' \) \
            ! -path 'src/CRCpp/*' \
            ! -path 'src/easyexif/*' \
            ! -path 'src/utfcpp/*' \
            ! -path 'src/wxSimpleJSON/*' \
            ! -path 'src/tinyexpr-plusplus/*' \
            ! -path 'src/ui/controls/gtk/*' \
            ! -path 'src/debug/*' \
            ! -path 'src/base/colors.h' \
            ! -path 'src/base/colors.cpp' \
            ! -path 'src/base/reportbuildercolors.cpp')
          echo "$FILES" | wc -l | xargs -I{} echo "Checking {} files..."
          echo "$FILES" | xargs sed -i 's/\r//'
          echo "$FILES" | xargs clang-format-19 --dry-run --Werror
