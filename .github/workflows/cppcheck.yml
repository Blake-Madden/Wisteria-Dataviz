name: cppcheck
on: [push]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: cppcheck-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          # Use -i to ignore the tests directory. 
          # Note: there is no space between -i and the directory name.
          cppcheck --enable=all \
                   --std=c++20 \
                   --inline-suppr \
                   --library=wxwidgets,windows \
                   -itests \
                   . > cppcheck_report.txt 2>&1 || true
          # Note: '|| true' prevents the step from failing early so your script can parse it.
          # XML version 2 is often easier to parse, but keeping it as text for your script below.
          # If you want plain text for your sed script, remove --xml-version=2.
          
          cppcheck --enable=all --std=c++20 --inline-suppr --library=wxwidgets,windows --exclude=./tests . > cppcheck_report.txt 2>&1 || true

      - name: print output
        run: |
             REPORTFILE=./cppcheck_report.txt
             WARNINGSFILE=./warnings.txt
             if test -f "$REPORTFILE"; then
                # Filter innocuous warnings and write the remaining ones to another file.
                sed 's/\[\(missingIncludeSystem\|assertWithSideEffect\|unknownMacro\|internalAstError\|missingInclude\|unusedFunction\|ConfigurationNotChecked\|toomanyconfigs\|unmatchedSuppression\|useStlAlgorithm\)\]//g' "$REPORTFILE" > "$WARNINGSFILE"
                
                # are there any remaining warnings?
                if grep -qP '\[[a-zA-Z0-9]{5,}\]' "$WARNINGSFILE"; then
                    echo Warnings detected:
                    echo ==================
                    grep -P '\[[a-zA-Z0-9]{5,}\]' "$WARNINGSFILE"
                    exit 1
                else
                    echo "No relevant warnings detected"
                fi
             else
                echo "$REPORTFILE" not found
                exit 1
             fi