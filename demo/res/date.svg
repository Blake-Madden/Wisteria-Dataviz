<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Calendar body with rounded corners -->
  <rect x="16" y="16" width="224" height="224" rx="16" ry="16" fill="white" stroke="#707070" stroke-width="4"/>

  <!-- Top header bar (coral/salmon color) -->
  <path d="M16 32 Q16 16 32 16 L224 16 Q240 16 240 32 L240 70 L16 70 Z" fill="#e8685d"/>

  <!-- Month number on left -->
  <text x="45" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">10</text>

  <!-- Month name and year on right -->
  <text x="160" y="42" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">October</text>
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">2025</text>

  <!-- Day headers -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">
    <text x="40" y="90">Mon</text>
    <text x="72" y="90">Tue</text>
    <text x="104" y="90">Wed</text>
    <text x="136" y="90">Thu</text>
    <text x="168" y="90">Fri</text>
    <text x="200" y="90">Sat</text>
    <text x="232" y="90">Sun</text>
  </g>

  <!-- Separator line -->
  <line x1="24" y1="96" x2="232" y2="96" stroke="#eee" stroke-width="1"/>

  <!-- Calendar days - October 2025 starts on Wednesday -->
  <g font-family="Arial, sans-serif" font-size="14" text-anchor="middle">
    <!-- Week 1 -->
    <text x="104" y="118" fill="#333">1</text>
    <text x="136" y="118" fill="#333">2</text>
    <text x="168" y="118" fill="#333">3</text>
    <text x="200" y="118" fill="#e8685d">4</text>
    <text x="232" y="118" fill="#e8685d">5</text>

    <!-- Week 2 -->
    <text x="40" y="142" fill="#333">6</text>
    <text x="72" y="142" fill="#333">7</text>
    <text x="104" y="142" fill="#333">8</text>
    <text x="136" y="142" fill="#333">9</text>
    <text x="168" y="142" fill="#333">10</text>
    <text x="200" y="142" fill="#e8685d">11</text>
    <text x="232" y="142" fill="#e8685d">12</text>

    <!-- Week 3 -->
    <text x="40" y="166" fill="#333">13</text>
    <text x="72" y="166" fill="#333">14</text>
    <text x="104" y="166" fill="#333">15</text>
    <text x="136" y="166" fill="#333">16</text>
    <text x="168" y="166" fill="#333">17</text>
    <text x="200" y="166" fill="#e8685d">18</text>
    <text x="232" y="166" fill="#e8685d">19</text>

    <!-- Week 4 -->
    <text x="40" y="190" fill="#333">20</text>
    <text x="72" y="190" fill="#333">21</text>
    <text x="104" y="190" fill="#333">22</text>
    <text x="136" y="190" fill="#333">23</text>
    <text x="168" y="190" fill="#333">24</text>
    <text x="200" y="190" fill="#e8685d">25</text>
    <text x="232" y="190" fill="#e8685d">26</text>

    <!-- Week 5 -->
    <text x="40" y="214" fill="#333">27</text>
    <text x="72" y="214" fill="#333">28</text>
    <text x="104" y="214" fill="#333">29</text>
    <text x="136" y="214" fill="#333">30</text>
    <!-- 31 with red circle marker -->
    <circle cx="168" cy="210" r="12" fill="none" stroke="#e8685d" stroke-width="2.5"/>
    <text x="168" y="214" fill="#333">31</text>
  </g>
</svg>
